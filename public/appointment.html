<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Book Appointment</h4>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
    <div class="app-card p-4">
      <p class="small text-muted">Logged in as <span id="patientName"></span></p>
      <div class="alert alert-warning small"><strong>Disclaimer:</strong> AI cannot diagnose medical conditions.</div>

      <section class="mb-4">
        <h5>1) Symptom Input</h5>
        <textarea id="symptoms" class="form-control" rows="3"></textarea>
        <button id="analyzeBtn" class="btn btn-primary mt-2">Analyze Symptoms</button>
      </section>

      <section id="aiResultSection" class="mb-4 d-none">
        <h5>2) AI Suggestion</h5>
        <div class="result-box">
          <p><strong>Department:</strong> <span id="departmentText"></span></p>
          <p><strong>Urgency:</strong> <span id="urgencyText"></span></p>
          <p class="mb-0"><strong>Recommendation:</strong> <span id="recommendationText"></span></p>
        </div>
        <button id="loadDoctorsBtn" class="btn btn-success mt-2">Show Available Doctors</button>
      </section>

      <section id="doctorSection" class="mb-4 d-none">
        <h5>3) Select Doctor & Slot</h5>
        <div id="doctorList" class="row g-3 mb-3"></div>
        <div class="row g-3">
          <div class="col-md-5"><input type="date" id="appointmentDate" class="form-control" /></div>
          <div class="col-md-4"><input type="time" id="appointmentTime" class="form-control" /></div>
          <div class="col-md-3"><button id="bookBtn" class="btn btn-dark w-100">Book</button></div>
        </div>
      </section>

      <section>
        <h5>My Appointments</h5>
        <button id="refreshAppointmentsBtn" class="btn btn-outline-secondary btn-sm mb-3">Refresh</button>
        <div id="appointmentsList" class="table-responsive"></div>
      </section>

      <div id="status" class="small mt-3"></div>
    </div>
  </div>
  <script src="js/appointment.js"></script>
</body>
</html>
