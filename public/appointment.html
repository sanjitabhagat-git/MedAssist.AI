<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Book Appointment</h4>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
    <div class="app-card p-4">
      <p class="small text-muted">Logged in as <span id="patientName"></span></p>
      <div class="alert alert-warning small"><strong>Disclaimer:</strong> AI cannot diagnose medical conditions.</div>

      <section class="mb-4">
        <h5>1) Symptom Input</h5>
        <textarea id="symptoms" class="form-control" rows="3"></textarea>
        <button id="analyzeBtn" class="btn btn-primary mt-2" type="button">
          <span class="btn-label">Analyze Symptoms</span>
          <span class="spinner-border spinner-border-sm ms-2 d-none btn-spinner" role="status" aria-hidden="true"></span>
        </button>
      </section>

      <section id="aiResultSection" class="mb-4 d-none">
        <h5>2) AI Suggestion</h5>
        <div class="result-box">
          <p><strong>Department:</strong> <span id="departmentText"></span></p>
          <p><strong>Urgency:</strong> <span id="urgencyText"></span></p>
          <p class="mb-0"><strong>Recommendation:</strong> <span id="recommendationText"></span></p>
        </div>
        <button id="loadDoctorsBtn" class="btn btn-success mt-2" type="button">
          <span class="btn-label">Show Available Doctors</span>
          <span class="spinner-border spinner-border-sm ms-2 d-none btn-spinner" role="status" aria-hidden="true"></span>
        </button>
      </section>

      <section id="doctorSection" class="mb-4 d-none">
        <h5>3) Select Doctor & Slot</h5>
        <div id="doctorList" class="row g-3 mb-3"></div>
        <div class="row g-3">
          <div class="col-md-4"><input type="text" id="appointmentDate" class="form-control" placeholder="Select Date" disabled /></div>
          <div class="col-md-4">
            <select id="appointmentTime" class="form-select" disabled>
              <option value="">Select Time Slot</option>
            </select>
          </div>
          <div class="col-md-4">
            <button id="bookBtn" class="btn btn-dark w-100" type="button" disabled>
              <span class="btn-label">Book</span>
              <span class="spinner-border spinner-border-sm ms-2 d-none btn-spinner" role="status" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </section>

      <section>
        <h5>My Appointments</h5>
        <button id="refreshAppointmentsBtn" class="btn btn-outline-secondary btn-sm mb-3" type="button">
          <span class="btn-label">Refresh</span>
          <span class="spinner-border spinner-border-sm ms-2 d-none btn-spinner" role="status" aria-hidden="true"></span>
        </button>
        <div id="appointmentsList" class="table-responsive"></div>
      </section>

      <div id="status" class="small mt-3"></div>
    </div>
  </div>
  <div id="pageLoader" class="page-loader d-none" aria-live="polite" aria-busy="true">
    <div class="text-center">
      <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem"></div>
      <div class="mt-2 fw-semibold">Loading...</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="js/auth.js"></script>
  <script src="js/appointment.js"></script>
</body>
</html>
