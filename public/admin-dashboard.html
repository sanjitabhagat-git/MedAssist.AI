<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Admin Dashboard</h4>
      <button id="adminLogoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
    <div class="app-card p-4">
      <button id="openAddDoctorBtn" class="btn btn-primary mb-3">Add New Doctor</button>
      <div id="doctorTableWrap" class="table-responsive"></div>
      <p id="status" class="small mt-3"></p>
    </div>
  </div>

  <div class="modal fade" id="addDoctorModal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Add New Doctor</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">
      <form id="addDoctorForm" class="row g-3" enctype="multipart/form-data">
        <div class="col-md-6"><input name="name" class="form-control" placeholder="Doctor Name" required /></div>
        <div class="col-md-6"><input name="degree" class="form-control" placeholder="Degree (MBBS, MD...)" required /></div>
        <div class="col-md-6"><select name="department" class="form-select" required><option value="">Select Department</option><option>Cardiology</option><option>Dermatology</option><option>Orthopedics</option><option>Neurology</option><option>General Medicine</option></select></div>
        <div class="col-md-6"><input name="fees" type="number" step="0.01" class="form-control" placeholder="Fees" required /></div>
        <div class="col-12"><input name="available_schedule" class="form-control" placeholder="Friday, 9am to 10am; Saturday, 1pm to 2pm" required /></div>
        <div class="col-12"><input name="photo" type="file" accept="image/*" class="form-control" /></div>
        <div class="col-12"><button class="btn btn-success" type="submit">Save Doctor</button></div>
      </form>
    </div></div></div>
  </div>

  <div class="modal fade" id="doctorDetailModal" tabindex="-1">
    <div class="modal-dialog modal-xl"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Doctor Detail</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="doctorDetailBody"></div></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
