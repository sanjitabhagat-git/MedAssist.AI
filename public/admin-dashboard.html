<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Admin Dashboard</h4>
      <button id="adminLogoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
    <div class="app-card p-4">
      <button id="openAddDoctorBtn" class="btn btn-primary mb-3">Add New Doctor</button>
      <div id="doctorTableWrap" class="table-responsive"></div>
      <p id="status" class="small mt-3"></p>
    </div>
  </div>

  <div class="modal fade" id="addDoctorModal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Add New Doctor</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">
      <form id="addDoctorForm" class="row g-3" enctype="multipart/form-data">
        <div class="col-md-6"><input name="name" class="form-control" placeholder="Doctor Name" required /></div>
        <div class="col-md-6"><input name="degree" class="form-control" placeholder="Degree (MBBS, MD...)" required /></div>
        <div class="col-md-6"><select name="department" class="form-select" required><option value="">Select Department</option><option>Cardiology</option><option>Dermatology</option><option>Orthopedics</option><option>Neurology</option><option>General Medicine</option></select></div>
        <div class="col-md-6"><input name="fees" type="number" step="0.01" class="form-control" placeholder="Fees" required /></div>
        <div class="col-12">
          <label class="form-label">Available Day/Time</label>
          <div id="availabilityRows" class="vstack gap-2"></div>
          <button id="addAvailabilityBtn" class="btn btn-outline-primary btn-sm mt-2" type="button">Add Another Slot</button>
        </div>
        <div class="col-12"><input name="photo" type="file" accept="image/*" class="form-control" /></div>
        <div class="col-12"><button class="btn btn-success" type="submit">Save Doctor</button></div>
      </form>
    </div></div></div>
  </div>

  <div class="modal fade" id="doctorDetailModal" tabindex="-1">
    <div class="modal-dialog modal-xl"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Doctor Detail</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="doctorDetailBody"></div></div></div>
  </div>

  <div class="modal fade" id="editDoctorModal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Edit Doctor</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">
      <form id="editDoctorForm" class="row g-3" enctype="multipart/form-data">
        <input type="hidden" name="id" />
        <div class="col-md-6"><input name="name" class="form-control" placeholder="Doctor Name" required /></div>
        <div class="col-md-6"><input name="degree" class="form-control" placeholder="Degree (MBBS, MD... )" required /></div>
        <div class="col-md-6"><select name="department" class="form-select" required><option value="">Select Department</option><option>Cardiology</option><option>Dermatology</option><option>Orthopedics</option><option>Neurology</option><option>General Medicine</option></select></div>
        <div class="col-md-6"><input name="fees" type="number" step="0.01" class="form-control" placeholder="Fees" required /></div>
        <div class="col-12">
          <label class="form-label">Available Day/Time</label>
          <div id="editAvailabilityRows" class="vstack gap-2"></div>
          <button id="editAddAvailabilityBtn" class="btn btn-outline-primary btn-sm mt-2" type="button">Add Another Slot</button>
        </div>
        <div class="col-12"><input name="photo" type="file" accept="image/*" class="form-control" /></div>
        <div class="col-12"><button class="btn btn-success" type="submit">Save Changes</button></div>
      </form>
    </div></div></div>
  </div>

  <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Confirm Delete</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="deleteConfirmBody">Are you sure you want to delete this doctor?</div><div class="modal-footer"><button id="confirmDeleteBtn" class="btn btn-danger">Delete</button><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button></div></div></div>
  </div>

  <div id="globalLoader" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:2000;align-items:center;justify-content:center;">
    <div class="text-center">
      <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem"></div>
      <div class="mt-2">Processing...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
