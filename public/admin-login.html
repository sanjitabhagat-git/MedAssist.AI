<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="app-card p-4">
          <h3 class="mb-3">Admin Login</h3>
          <p class="small text-muted">Default: admin@demo.com / admin123</p>
          <form id="adminLoginForm" class="row g-3">
            <div class="col-12"><input id="email" type="email" class="form-control" placeholder="Email" required value="admin@demo.com"/></div>
            <div class="col-12"><input id="password" type="password" class="form-control" placeholder="Password" required value="admin123"/></div>
            <div class="col-12"><button class="btn btn-dark w-100" type="submit">Login as Admin</button></div>
          </form>
          <p id="status" class="small mt-3"></p>
        </div>
      </div>
    </div>
  </div>
  <script src="js/admin-login.js"></script>
</body>
</html>
